name: Recovery Patcher

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: "Direct URL of recovery.img or recovery.img.lz4"
        required: true

permissions:
  contents: write

jobs:
  patch:
    name: Patch Recovery
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          wget \
          curl \
          unzip \
          zip \
          xz-utils \
          lz4 \
          tar \
          openssl \
          python3 \
          python3-pip \
          file

    - name: Repository Structure
      run: |
        echo "Repository:"
        pwd
        ls -lah
        find . -maxdepth 2 -type f

    - name: Download Recovery
      run: |
        wget "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img

        if [ ! -f recovery.img ]; then
          echo "Recovery image download failed."
          exit 1
        fi

        file recovery.img

    - name: Make Files Executable
      run: |
        chmod +x files/script1.sh
        chmod +x files/script2.sh
        chmod +x files/magiskboot
        chmod +x files/avbtool.py || true

    - name: Patch Recovery (Stage 1)
      working-directory: files
      run: |
        ./script1.sh ../recovery.img

    - name: Patch Recovery (Stage 2)
      working-directory: files
      run: |
        ./script2.sh

    - name: Show Output
      run: |
        find . -type f

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: patched-recovery
        path: |
          output/**
          *.img
          *.tar*
